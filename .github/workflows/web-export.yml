name: 웹 빌드 & GitHub Pages 배포

on:
  push:
    branches: [main]
    paths:
      - 'project/**'
      - 'export_presets.cfg'
      - 'project.godot'
  workflow_dispatch:
  repository_dispatch:
    types: [scenes-updated]

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6"

jobs:
  export-web:
    name: Godot Web Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Godot binaries
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Install Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          rm -rf templates templates.tpz godot.zip

      - name: Fetch novel scenes from mapping-dosa
        run: |
          mkdir -p project/scenes/novel
          python3 - <<'EOF'
import urllib.request, json, os, sys

api_url = "https://api.github.com/repos/Arrru/mapping-dosa/contents/scenes"
try:
    req = urllib.request.Request(
        api_url,
        headers={"Accept": "application/vnd.github+json", "User-Agent": "dosa-ci"}
    )
    with urllib.request.urlopen(req, timeout=15) as resp:
        data = json.loads(resp.read())
    if not isinstance(data, list):
        print("mapping-dosa: scenes 폴더 없음 - 건너뜀")
        sys.exit(0)
    count = 0
    for f in data:
        if f["name"].endswith(".json") and f.get("download_url"):
            dest = os.path.join("project/scenes/novel", f["name"])
            urllib.request.urlretrieve(f["download_url"], dest)
            print(f"다운로드: {f['name']}")
            count += 1
    print(f"총 {count}개 씬 다운로드 완료")
except Exception as e:
    print(f"mapping-dosa scenes 다운로드 실패 (무시됨): {e}")
EOF

      - name: Export Web Build
        run: |
          mkdir -p docs
          ./godot --headless --path . --export-release "Web" "$(pwd)/docs/index.html"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet \
            && echo "변경된 파일 없음 - 배포 생략" \
            || (git commit -m "ci: 웹 빌드 자동 배포 [skip ci]" && git push)
